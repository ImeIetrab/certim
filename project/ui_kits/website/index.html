<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CertIM — Préparez votre certification financière</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-sans); background: var(--bg); -webkit-font-smoothing: antialiased; }
  .overlay { position: fixed; inset: 0; background: rgba(4,9,26,.55); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 24px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="SiteChrome.jsx"></script>
<script type="text/babel" src="LandingPage.jsx"></script>
<script type="text/babel">
  const { Button, Badge } = window.CertIMDesignSystem_2a4d2d;

  const PRICING_FEATURES = [
    'Accès illimité à toute la banque de questions',
    'Entraînements par thème avec corrections',
    'Examens blancs en conditions réelles (2h30)',
    'Statistiques avancées et progression par thème',
    'Streak quotidien et suivi de maîtrise',
    'Support par email',
  ];

  function SubscribeModal({ onClose }) {
    return (
      <div className="overlay" onClick={onClose}>
        <div onClick={(e) => e.stopPropagation()} style={{ background: 'var(--white)', border: '2px solid var(--navy)', borderRadius: 'var(--radius-2xl)', padding: '40px 44px', maxWidth: 440, width: '100%', textAlign: 'center', boxShadow: 'var(--shadow-pricing)' }}>
          <span style={{ display: 'inline-block', background: 'var(--navy)', color: 'var(--gold)', fontSize: 11, fontWeight: 700, letterSpacing: '.1em', padding: '5px 14px', borderRadius: 'var(--radius-pill)', marginBottom: 20 }}>CERTIFICATION AMF</span>
          <div style={{ marginBottom: 8 }}>
            <span style={{ fontSize: '3.5rem', fontWeight: 800, letterSpacing: '-.04em' }}>34,99</span>
            <span style={{ fontSize: '1.4rem', fontWeight: 600 }}> €</span>
            <span style={{ color: 'var(--text-muted)', fontSize: 16 }}>/mois</span>
          </div>
          <p style={{ color: 'var(--text-muted)', fontSize: 14, marginBottom: 28 }}>Sans engagement · Résiliation à tout moment</p>
          <div style={{ textAlign: 'left', marginBottom: 28 }}>
            {PRICING_FEATURES.map((f) => (
              <div key={f} style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 12 }}>
                <span style={{ width: 20, height: 20, background: 'var(--navy)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 2, color: 'var(--gold)', fontSize: 10, fontWeight: 700 }}>✓</span>
                <span style={{ fontSize: 14, lineHeight: 1.5 }}>{f}</span>
              </div>
            ))}
          </div>
          <a href="../app/index.html" style={{ textDecoration: 'none' }}>
            <Button variant="secondary" iconRight="→" style={{ width: '100%', background: 'var(--navy)', color: 'var(--gold)', justifyContent: 'center', padding: '15px 0', fontSize: 16 }}>S'abonner et accéder au tableau de bord</Button>
          </a>
          <p style={{ color: 'var(--text-muted)', fontSize: 12, marginTop: 12 }}>Paiement sécurisé par Stripe · SSL</p>
        </div>
      </div>
    );
  }

  function Site() {
    const [modal, setModal] = React.useState(false);
    return (
      <React.Fragment>
        <window.SiteNav onStart={() => setModal(true)} />
        <window.LandingPage onStart={() => setModal(true)} />
        <window.SiteFooter />
        {modal ? <SubscribeModal onClose={() => setModal(false)} /> : null}
      </React.Fragment>
    );
  }

  function mount() {
    if (!window.SiteNav || !window.LandingPage || !window.SiteFooter) { setTimeout(mount, 40); return; }
    ReactDOM.createRoot(document.getElementById('root')).render(<Site />);
  }
  mount();
</script>
</body>
</html>
