<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces badges & heatmap" subtitle="Pass / Fail + intensité d'activité calendrier" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); padding: 18px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { padding: 6px 12px; border-radius: var(--radius-pill); font-size: 10px; font-weight: 700; letter-spacing: .04em; }
  .blk { width: 56px; height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .cap { font-size: 10px; color: var(--blue-light); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; align-self: center; min-width: 84px; }
</style>
</head>
<body>
  <div class="row">
    <span class="cap">Badges</span>
    <span class="pill" style="background:#DCFCE7;color:#166534">RÉUSSI</span>
    <span class="pill" style="background:#FEE2E2;color:#991B1B">ÉCHOUÉ</span>
    <span class="pill" style="background:#DCFCE7;color:#166534">ACTIF</span>
    <span class="pill" style="background:#C8B882;color:#04091A;font-weight:800;font-size:9px">AMF</span>
  </div>
  <div class="row">
    <span class="cap">Heatmap</span>
    <span class="blk" style="background:#FEF3C7;color:#92400E">8</span>
    <span class="blk" style="background:#FED7AA;color:#9A3412">18</span>
    <span class="blk" style="background:#BBF7D0;color:#166534">45</span>
    <span class="blk" style="background:var(--bg);border:1px solid var(--border);color:var(--border)">—</span>
  </div>
</body>
</html>
