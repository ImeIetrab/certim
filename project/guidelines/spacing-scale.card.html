<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 22px 24px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--gold); border-radius: var(--radius-xs); width: 22px; }
  .n { font-size: 11px; color: var(--blue-light); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="u"><div class="bar" style="height:4px"></div><div class="n">4</div></div>
    <div class="u"><div class="bar" style="height:8px"></div><div class="n">8</div></div>
    <div class="u"><div class="bar" style="height:12px"></div><div class="n">12</div></div>
    <div class="u"><div class="bar" style="height:16px"></div><div class="n">16</div></div>
    <div class="u"><div class="bar" style="height:20px"></div><div class="n">20</div></div>
    <div class="u"><div class="bar" style="height:24px"></div><div class="n">24</div></div>
    <div class="u"><div class="bar" style="height:32px"></div><div class="n">32</div></div>
    <div class="u"><div class="bar" style="height:48px"></div><div class="n">48</div></div>
    <div class="u"><div class="bar" style="height:64px"></div><div class="n">64</div></div>
  </div>
</body>
</html>
