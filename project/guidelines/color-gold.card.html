<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--navy); padding: 18px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--navy-border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--navy-card); }
  .name { font-size: 12px; font-weight: 700; color: var(--cream); }
  .hex { font-size: 11px; color: var(--blue-light); font-variant-numeric: tabular-nums; margin-top: 2px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#C8B882"></div><div class="meta"><div class="name">Gold</div><div class="hex">#C8B882</div></div></div>
    <div class="sw"><div class="chip" style="background:#A89660"></div><div class="meta"><div class="name">Gold Dark · hover</div><div class="hex">#A89660</div></div></div>
    <div class="sw"><div class="chip" style="background:rgba(200,184,130,0.10)"></div><div class="meta"><div class="name">Accent fill 10%</div><div class="hex">rgba gold .10</div></div></div>
  </div>
</body>
</html>
