<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Crème, beige page, blanc card, bordure" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); padding: 18px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--white); }
  .name { font-size: 12px; font-weight: 700; color: var(--navy); }
  .hex { font-size: 11px; color: var(--blue-light); font-variant-numeric: tabular-nums; margin-top: 2px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#F0EBE0"></div><div class="meta"><div class="name">Cream</div><div class="hex">#F0EBE0</div></div></div>
    <div class="sw"><div class="chip" style="background:#F7F4EF"></div><div class="meta"><div class="name">BG page</div><div class="hex">#F7F4EF</div></div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">White card</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#D6CEBD"></div><div class="meta"><div class="name">Border</div><div class="hex">#D6CEBD</div></div></div>
  </div>
</body>
</html>
