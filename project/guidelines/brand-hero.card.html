<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); }
  .hero {
    position: relative; height: 180px; overflow: hidden;
    background: linear-gradient(135deg, #04091A 0%, #071020 60%, #0F2240 100%);
    display: flex; align-items: center; padding: 0 28px;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(#F0EBE0 1px, transparent 1px), linear-gradient(90deg, #F0EBE0 1px, transparent 1px);
    background-size: 50px 50px; opacity: .04;
  }
  .inner { position: relative; }
  .badge {
    display: inline-block; background: rgba(200,184,130,.12); border: 1px solid rgba(200,184,130,.3);
    color: var(--gold); padding: 6px 16px; border-radius: 100px; font-size: 11px; font-weight: 600;
    letter-spacing: .06em; margin-bottom: 14px;
  }
  .h { color: var(--cream); font-size: 26px; font-weight: 800; letter-spacing: -.03em; line-height: 1.1; }
  .h span { color: var(--gold); }
</style>
</head>
<body>
  <div class="hero">
    <div class="inner">
      <span class="badge">CERTIFICATION AMF</span>
      <div class="h">Préparez votre<br><span>certification financière</span></div>
    </div>
  </div>
</body>
</html>
