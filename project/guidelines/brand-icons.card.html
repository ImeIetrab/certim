<!-- @dsCard group="Brand" viewport="700x160" name="Iconographie" subtitle="Glyphes géométriques Unicode + flèches, pas de SVG" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--navy); padding: 22px 24px; }
  .row { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .glyph { font-size: 24px; color: var(--gold); line-height: 1; }
  .lbl { font-size: 10px; color: var(--blue-light); }
  .note { color: var(--blue-light); font-size: 11px; margin-top: 16px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="row">
    <div class="ic"><span class="glyph">◈</span><span class="lbl">Tableau</span></div>
    <div class="ic"><span class="glyph">◎</span><span class="lbl">Entraîn.</span></div>
    <div class="ic"><span class="glyph">◉</span><span class="lbl">Examens</span></div>
    <div class="ic"><span class="glyph">◐</span><span class="lbl">Stats</span></div>
    <div class="ic"><span class="glyph">◑</span><span class="lbl">Compte</span></div>
    <div class="ic"><span class="glyph">✓</span><span class="lbl">Check</span></div>
    <div class="ic"><span class="glyph">→</span><span class="lbl">CTA</span></div>
    <div class="ic"><span class="glyph">▶</span><span class="lbl">Lancer</span></div>
    <div class="ic"><span class="glyph" style="color:#fff">🔥</span><span class="lbl">Streak</span></div>
  </div>
  <p class="note">Glyphes géométriques Unicode en or sur navy pour la navigation. Flèches « → » sur les CTA, « ✓ » pour les validations, emoji 🔥/👋 avec parcimonie (gamification).</p>
</body>
</html>
