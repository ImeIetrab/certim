<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); padding: 18px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--white); }
  .name { font-size: 12px; font-weight: 700; color: var(--navy); }
  .hex { font-size: 11px; color: var(--blue-light); font-variant-numeric: tabular-nums; margin-top: 2px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#04091A"></div><div class="meta"><div class="name">Navy</div><div class="hex">#04091A</div></div></div>
    <div class="sw"><div class="chip" style="background:#071020"></div><div class="meta"><div class="name">Navy Mid</div><div class="hex">#071020</div></div></div>
    <div class="sw"><div class="chip" style="background:#0C1D38"></div><div class="meta"><div class="name">Navy Card</div><div class="hex">#0C1D38</div></div></div>
    <div class="sw"><div class="chip" style="background:#020611"></div><div class="meta"><div class="name">Deepest</div><div class="hex">#020611</div></div></div>
  </div>
</body>
</html>
