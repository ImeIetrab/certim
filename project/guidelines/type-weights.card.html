<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); color: var(--navy); padding: 20px 24px; }
  .row { display: flex; gap: 10px; }
  .w { flex: 1; text-align: center; }
  .glyph { font-size: 34px; line-height: 1.1; letter-spacing: -.02em; }
  .lbl { font-size: 11px; color: var(--blue-light); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="w"><div class="glyph" style="font-weight:400">Aa</div><div class="lbl">Regular 400</div></div>
    <div class="w"><div class="glyph" style="font-weight:500">Aa</div><div class="lbl">Medium 500</div></div>
    <div class="w"><div class="glyph" style="font-weight:600">Aa</div><div class="lbl">Semibold 600</div></div>
    <div class="w"><div class="glyph" style="font-weight:700">Aa</div><div class="lbl">Bold 700</div></div>
    <div class="w"><div class="glyph" style="font-weight:800">Aa</div><div class="lbl">Black 800</div></div>
  </div>
</body>
</html>
