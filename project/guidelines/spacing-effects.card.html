<!-- @dsCard group="Spacing" viewport="700x160" name="Rayons & ombres" subtitle="Corner radii et système d'ombres" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); padding: 22px 24px; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .cap { font-size: 10px; color: var(--blue-light); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; min-width: 64px; }
  .box { width: 52px; height: 44px; background: var(--white); border: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; }
  .n { font-size: 10px; color: var(--blue-light); }
  .sh { width: 64px; height: 44px; background: var(--white); border-radius: var(--radius-lg); }
</style>
</head>
<body>
  <div class="row">
    <span class="cap">Radii</span>
    <div class="box" style="border-radius:3px"><span class="n">3</span></div>
    <div class="box" style="border-radius:6px"><span class="n">6</span></div>
    <div class="box" style="border-radius:8px"><span class="n">8</span></div>
    <div class="box" style="border-radius:12px"><span class="n">12</span></div>
    <div class="box" style="border-radius:16px"><span class="n">16</span></div>
    <div class="box" style="border-radius:100px;width:64px"><span class="n">pill</span></div>
  </div>
  <div class="row">
    <span class="cap">Shadows</span>
    <div class="sh" style="box-shadow:0 1px 3px rgba(0,0,0,.06)"></div>
    <div class="sh" style="box-shadow:0 2px 8px rgba(0,0,0,.08)"></div>
    <div class="sh" style="box-shadow:0 4px 16px rgba(0,0,0,.12)"></div>
    <div class="sh" style="box-shadow:0 8px 40px rgba(4,9,26,.12)"></div>
  </div>
</body>
</html>
